# ---------------------------------------------------------------------------
# UIA-X  CI — Linux AT-SPI2 backend
# ---------------------------------------------------------------------------
# Runs on every push/PR that touches Python files or the Docker setup.
# Two jobs:
#   1. unit-tests  — fast, no display needed (mock AT-SPI objects)
#   2. integration — Xvfb + gnome-calculator inside Docker container
# ---------------------------------------------------------------------------
name: Linux AT-SPI2 CI

on:
  push:
    branches: [main, linux_backend, "feature/**"]
    paths:
      - "uiax/**"
      - "server/**"
      - "tests/**"
      - "docker/**"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/linux-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "uiax/**"
      - "server/**"
      - "tests/**"
      - "docker/**"
      - "pyproject.toml"
      - "requirements.txt"

jobs:
  # -----------------------------------------------------------------------
  # Unit tests — no Docker needed, runs directly on the GH runner
  # -----------------------------------------------------------------------
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install AT-SPI2 system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-pyatspi gir1.2-atspi-2.0 at-spi2-core \
            python3-gi dbus dbus-x11

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_linux_backend.py \
            tests/test_tools.py \
            tests/test_auth.py \
            tests/test_input.py \
            tests/test_process.py \
            -v --tb=short

  # -----------------------------------------------------------------------
  # Integration tests — Docker container with Xvfb + gnome-calculator
  # -----------------------------------------------------------------------
  integration-tests:
    name: Integration tests (Docker + Xvfb)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t uiax-linux -f docker/Dockerfile .

      - name: Run integration tests
        run: |
          docker run --rm \
            -e UIAX_RUN_INTEGRATION=1 \
            -e UIAX_TEST_APP=gnome-calculator \
            uiax-linux \
            ./tests/run_headless.sh \
              python3 -m pytest tests/test_linux_integration_docker.py -v --tb=short

      - name: Run full test suite in container
        run: |
          docker run --rm \
            -e UIAX_RUN_INTEGRATION=1 \
            -e UIAX_TEST_APP=gnome-calculator \
            uiax-linux \
            ./tests/run_headless.sh \
              python3 -m pytest tests/ -v --tb=short \
              --ignore=tests/test_linux_integration.py
